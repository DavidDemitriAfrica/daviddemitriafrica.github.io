<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>

    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="David Demitri Africa - AI alignment researcher at UK AISI. Studying consistency training, evaluation awareness, and unintended generalization.">
    <meta property="og:image" content="https://daviddemitriafrica.github.io/assets/cutout.png">
    <meta property="og:url" content="https://daviddemitriafrica.github.io{{ page.url }}">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:site" content="@DavidDAfrica">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="AI alignment researcher at UK AISI. Studying consistency training, evaluation awareness, and unintended generalization.">
    <meta name="twitter:image" content="https://daviddemitriafrica.github.io/assets/cutout.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    {% include header.html %}
    
    <div id="maincontent">
        <main>
            {{ content }}
        </main>
    </div>

    {% include footer.html %}

    <script>
        function expand(element) {
            element.parentElement.classList.add("expanded");
        }

        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll(".trigger").forEach(function(el) {
                el.setAttribute("tabindex", "0");
                el.setAttribute("role", "button");
                el.addEventListener("keydown", function(e) {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        expand(el);
                    }
                });
            });
        });
    </script>
</body>
</html>
